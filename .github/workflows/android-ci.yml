name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_CLIENT_ID: ${{ vars.PUBLIC_GITHUB_OAUTH_CLIENT_ID || 'Ov23lim8WhLjeUMqvuMj' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.13
      - name: Unit tests
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --stacktrace 2>&1 | tee unit-tests.log
      - name: Compile Compose UI tests
        run: |
          set -o pipefail
          ./gradlew assembleDebugAndroidTest --stacktrace 2>&1 | tee ui-tests.log
      - name: Lint
        run: ./gradlew lintDebug --stacktrace
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Verify release build
        run: ./gradlew assembleRelease --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: github-rock-verification
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
            unit-tests.log
            ui-tests.log
            gradlew
            gradlew.bat
            gradle/wrapper/gradle-wrapper.jar
            gradle/wrapper/gradle-wrapper.properties
          if-no-files-found: warn
