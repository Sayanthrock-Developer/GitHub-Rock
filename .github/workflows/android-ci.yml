name: Android CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Test, lint and assemble
        id: gradle_verify
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --stacktrace 2>&1 | tee gradle-verification.log

      - name: Upload complete Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-verification-log
          path: gradle-verification.log
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug APK
        if: steps.gradle_verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: github-rock-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail when Gradle verification failed
        if: steps.gradle_verify.outcome == 'failure'
        run: exit 1
