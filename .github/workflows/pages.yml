name: Deploy GitHub Rock website

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "tools/web/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "site/**"
      - "tools/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate installable website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify static website
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            site/index.html
            site/404.html
            site/manifest.webmanifest
            site/sw.js
            site/assets/app.js
            site/assets/styles.css
            site/assets/icon-192.png
            site/assets/icon-512.png
            site/assets/apple-touch-icon.png
            site/privacy-policy/index.html
            site/terms/index.html
          )
          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "::error title=Missing website file::$file was not found."
              exit 1
            }
          done
          node --check site/assets/app.js
          node --check site/sw.js
          jq empty site/manifest.webmanifest
          node tools/web/test-pwa-installability.mjs

  deploy:
    name: Deploy website
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # GitHub Pages must be enabled once in Repository Settings with
      # Build and deployment -> Source set to "GitHub Actions".
      # A workflow GITHUB_TOKEN cannot create the Pages site itself.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload static website
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
