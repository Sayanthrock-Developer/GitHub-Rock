name: Build Android Artifact

on:
  workflow_dispatch:
    inputs:
      artifact_type:
        description: Artifact to build
        required: true
        type: choice
        options: [debug-apk, release-apk, release-aab]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_CLIENT_ID: ${{ vars.PUBLIC_GITHUB_CLIENT_ID || 'Iv23liBz9KwjI8S24igW' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.13
      - name: Validate build configuration
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${{ inputs.artifact_type }}" != "debug-apk" ]; then
            [ -n "$GITHUB_CLIENT_ID" ] || { echo "Set the GITHUB_CLIENT_ID Actions variable before building a release."; exit 1; }
            for value in "$KEYSTORE_BASE64" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
              [ -n "$value" ] || { echo "All Android signing secrets are required for release artifacts."; exit 1; }
            done
          fi
      - name: Prepare signing from repository secrets
        if: ${{ inputs.artifact_type != 'debug-apk' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/github-rock-release.jks"
      - name: Build debug APK
        if: ${{ inputs.artifact_type == 'debug-apk' }}
        run: gradle :app:assembleDebug --stacktrace
      - name: Build release APK
        if: ${{ inputs.artifact_type == 'release-apk' }}
        env:
          GITHUB_ROCK_KEYSTORE_PATH: ${{ runner.temp }}/github-rock-release.jks
          GITHUB_ROCK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GITHUB_ROCK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_ROCK_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --stacktrace
      - name: Build release AAB
        if: ${{ inputs.artifact_type == 'release-aab' }}
        env:
          GITHUB_ROCK_KEYSTORE_PATH: ${{ runner.temp }}/github-rock-release.jks
          GITHUB_ROCK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GITHUB_ROCK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_ROCK_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:bundleRelease --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: github-rock-${{ inputs.artifact_type }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
