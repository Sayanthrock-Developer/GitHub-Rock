name: Build Android Artifact

on:
  workflow_dispatch:
    inputs:
      artifact_type:
        description: Artifact to build
        required: true
        type: choice
        options: [debug-apk, release-apk, release-aab]

permissions:
  contents: read

concurrency:
  group: android-artifact-${{ github.ref }}-${{ inputs.artifact_type }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_CLIENT_ID: ${{ vars.PUBLIC_GITHUB_CLIENT_ID || 'Iv23liBz9KwjI8S24igW' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.13
      - name: Validate build configuration
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ "${{ inputs.artifact_type }}" = "debug-apk" ]; then
            echo "Debug APK does not require release signing secrets."
            exit 0
          fi

          [ -n "$GITHUB_CLIENT_ID" ] || {
            echo "Set the public GITHUB_CLIENT_ID Actions variable."
            exit 1
          }

          missing=()
          [ -n "${KEYSTORE_BASE64:-}" ] || missing+=(ANDROID_KEYSTORE_BASE64)
          [ -n "${KEYSTORE_PASSWORD:-}" ] || missing+=(ANDROID_KEYSTORE_PASSWORD)
          [ -n "${KEY_ALIAS:-}" ] || missing+=(ANDROID_KEY_ALIAS)
          [ -n "${KEY_PASSWORD:-}" ] || missing+=(ANDROID_KEY_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing or empty Actions secret: %s\n' "${missing[@]}"
            echo "Create each secret under Settings > Secrets and variables > Actions."
            exit 1
          fi

          echo "All required release build settings are present."
      - name: Prepare and validate signing keystore
        if: ${{ inputs.artifact_type != 'debug-apk' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          RELEASE_KEYSTORE="$RUNNER_TEMP/github-rock-release.jks"
          VALIDATION_KEYSTORE="$RUNNER_TEMP/github-rock-validation.p12"
          trap 'rm -f "$VALIDATION_KEYSTORE"' EXIT

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RELEASE_KEYSTORE"
          [ -s "$RELEASE_KEYSTORE" ] || {
            echo "The decoded Android keystore is empty. Replace ANDROID_KEYSTORE_BASE64."
            exit 1
          }

          keytool -list \
            -keystore "$RELEASE_KEYSTORE" \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null

          keytool -importkeystore \
            -srckeystore "$RELEASE_KEYSTORE" \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -srcalias "$KEY_ALIAS" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeystore "$VALIDATION_KEYSTORE" \
            -deststoretype PKCS12 \
            -deststorepass validation-only-password \
            -destkeypass validation-only-password \
            -noprompt >/dev/null

          echo "Android signing keystore, alias, and private-key password validated."
      - name: Build debug APK
        if: ${{ inputs.artifact_type == 'debug-apk' }}
        run: ./gradlew :app:assembleDebug --stacktrace
      - name: Build release APK
        if: ${{ inputs.artifact_type == 'release-apk' }}
        env:
          GITHUB_ROCK_KEYSTORE_PATH: ${{ runner.temp }}/github-rock-release.jks
          GITHUB_ROCK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GITHUB_ROCK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_ROCK_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace
      - name: Build release AAB
        if: ${{ inputs.artifact_type == 'release-aab' }}
        env:
          GITHUB_ROCK_KEYSTORE_PATH: ${{ runner.temp }}/github-rock-release.jks
          GITHUB_ROCK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GITHUB_ROCK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_ROCK_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: github-rock-${{ inputs.artifact_type }}
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
