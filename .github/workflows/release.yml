name: Publish Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix, for example 0.2.0
        required: true
        default: 0.2.0
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-android-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_CLIENT_ID: ${{ vars.PUBLIC_GITHUB_CLIENT_ID || 'Iv23liBz9KwjI8S24igW' }}
      VERSION: ${{ inputs.version }}
      PRERELEASE: ${{ inputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.13
      - name: Validate release configuration
        env:
          GH_TOKEN: ${{ github.token }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]] || { echo "Use a version such as 0.2.0."; exit 1; }
          [ -n "$GITHUB_CLIENT_ID" ] || { echo "Set the public GITHUB_CLIENT_ID Actions variable."; exit 1; }
          for value in "$KEYSTORE_BASE64" "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
            [ -n "$value" ] || { echo "All Android signing secrets are required."; exit 1; }
          done
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists. Choose a new version."
            exit 1
          fi
      - name: Prepare signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/github-rock-release.jks"
      - name: Build signed release APK
        env:
          GITHUB_ROCK_KEYSTORE_PATH: ${{ runner.temp }}/github-rock-release.jks
          GITHUB_ROCK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GITHUB_ROCK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_ROCK_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace \
            -PGITHUB_ROCK_VERSION_NAME="$VERSION" \
            -PGITHUB_ROCK_VERSION_CODE="${{ github.run_number }}"
      - name: Verify signature and checksum
        run: |
          APK="$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          [ -f "$APK" ] || { echo "No release APK was produced."; exit 1; }
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          [ -x "$APKSIGNER" ] || { echo "Android apksigner was not found."; exit 1; }
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          mkdir -p dist
          cp "$APK" "dist/GitHub-Rock-$VERSION.apk"
          (cd dist && sha256sum "GitHub-Rock-$VERSION.apk" > "GitHub-Rock-$VERSION.apk.sha256")
      - name: Upload verified workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHub-Rock-${{ inputs.version }}
          path: dist/*
          if-no-files-found: error
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FLAGS=()
          if [ "$PRERELEASE" = "true" ]; then FLAGS+=(--prerelease); fi
          gh release create "v$VERSION" dist/* \
            --target "$GITHUB_SHA" \
            --title "GitHub Rock v$VERSION" \
            --generate-notes \
            "${FLAGS[@]}"
