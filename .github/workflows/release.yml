name: Publish GitHub Rock Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version with or without the v prefix; blank creates a unique automatic version
        required: false
        default: ''
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/release-request.json"

permissions:
  contents: write

concurrency:
  group: publish-github-rock-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Build and verify Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.release_metadata.outputs.version }}
      release_tag: ${{ steps.release_metadata.outputs.release_tag }}
      prerelease: ${{ steps.release_metadata.outputs.prerelease }}
    env:
      GITHUB_CLIENT_ID: ${{ vars.PUBLIC_GITHUB_OAUTH_CLIENT_ID || 'Ov23lim8WhLjeUMqvuMj' }}
      GITHUB_ROCK_BACKEND_URL: ${{ vars.GITHUB_ROCK_BACKEND_URL || '' }}
      EXPECTED_RELEASE_CERT_SHA256: ${{ vars.EXPECTED_RELEASE_CERT_SHA256 }}
      INPUT_VERSION: ${{ inputs.version }}
      INPUT_PRERELEASE: ${{ inputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.13
      - id: release_metadata
        name: Resolve release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
            VERSION="${RELEASE_TAG#v}"
            if [[ "$VERSION" == *-* ]]; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            [ "$GITHUB_REF_NAME" = "main" ] || {
              echo "Reviewed release requests must be merged to main."
              exit 1
            }

            RELEASE_REQUEST_FILE=".github/release-request.json"
            jq -e '
              type == "object" and
              (.version | type == "string") and
              (.prerelease | type == "boolean") and
              (.public == true)
            ' "$RELEASE_REQUEST_FILE" >/dev/null || {
              echo "The release request must contain version, boolean prerelease, and public=true."
              exit 1
            }

            VERSION="$(jq -r '.version' "$RELEASE_REQUEST_FILE")"
            VERSION="${VERSION#v}"
            RELEASE_TAG="v$VERSION"
            PRERELEASE="$(jq -r '.prerelease' "$RELEASE_REQUEST_FILE")"
          else
            REQUESTED_VERSION="${INPUT_VERSION#v}"
            if [ -n "$REQUESTED_VERSION" ]; then
              VERSION="$REQUESTED_VERSION"
            else
              LATEST_VERSION="$(
                gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
                  --jq '.[].tag_name' |
                  sed -n -E 's/^v?([0-9]+\.[0-9]+\.[0-9]+)(-[A-Za-z0-9.-]+)?$/\1/p' |
                  sort -V |
                  tail -n 1
              )"
              if [ -z "$LATEST_VERSION" ]; then
                VERSION="0.1.0"
              else
                IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
                VERSION="$MAJOR.$MINOR.$((10#$PATCH + 1))"
              fi
            fi
            RELEASE_TAG="v$VERSION"
            PRERELEASE="$(printf '%s' "${INPUT_PRERELEASE:-false}" | tr '[:upper:]' '[:lower:]')"
          fi

          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]] || {
            echo "Use a version such as 0.2.0 or 0.2.0-beta.1."
            exit 1
          }

          [ "$PRERELEASE" = "true" ] || [ "$PRERELEASE" = "false" ] || {
            echo "Prerelease must be true or false."
            exit 1
          }

          {
            echo "VERSION=$VERSION"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "PRERELEASE=$PRERELEASE"
          } >> "$GITHUB_ENV"
          {
            echo "version=$VERSION"
            echo "release_tag=$RELEASE_TAG"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Release request"
            echo
            echo "- Tag: \`$RELEASE_TAG\`"
            echo "- Version: \`$VERSION\`"
            echo "- Public release: yes"
            echo "- Prerelease: \`$PRERELEASE\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Validate release configuration
        env:
          GH_TOKEN: ${{ github.token }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          [ -n "$GITHUB_CLIENT_ID" ] || {
            echo "Set the PUBLIC_GITHUB_OAUTH_CLIENT_ID Actions variable."
            exit 1
          }

          PINNED_CERT_FILE=".github/release-signing-cert.sha256"
          [ -s "$PINNED_CERT_FILE" ] || {
            echo "The reviewed signing-certificate pin is missing: $PINNED_CERT_FILE"
            exit 1
          }

          normalize_fingerprint() {
            printf '%s' "$1" | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]'
          }

          PINNED_CERT_SHA256="$(normalize_fingerprint "$(cat "$PINNED_CERT_FILE")")"
          [[ "$PINNED_CERT_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
            echo "The reviewed signing-certificate pin is not a valid SHA-256 fingerprint."
            exit 1
          }

          if [ -n "$EXPECTED_RELEASE_CERT_SHA256" ]; then
            VARIABLE_CERT_SHA256="$(normalize_fingerprint "$EXPECTED_RELEASE_CERT_SHA256")"
            [ "$VARIABLE_CERT_SHA256" = "$PINNED_CERT_SHA256" ] || {
              echo "EXPECTED_RELEASE_CERT_SHA256 does not match $PINNED_CERT_FILE."
              echo "Update the reviewed pin and repository variable together after an intentional key rotation."
              exit 1
            }
          fi

          echo "EXPECTED_RELEASE_CERT_SHA256=$PINNED_CERT_SHA256" >> "$GITHUB_ENV"

          missing=()
          [ -n "${KEYSTORE_BASE64:-}" ] || missing+=(ANDROID_KEYSTORE_BASE64)
          [ -n "${KEYSTORE_PASSWORD:-}" ] || missing+=(ANDROID_KEYSTORE_PASSWORD)
          [ -n "${KEY_ALIAS:-}" ] || missing+=(ANDROID_KEY_ALIAS)
          [ -n "${KEY_PASSWORD:-}" ] || missing+=(ANDROID_KEY_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing or empty Actions secret: %s\n' "${missing[@]}"
            echo "Create each secret under Settings > Secrets and variables > Actions."
            exit 1
          fi

          echo "Signing secrets and the reviewed certificate fingerprint are present."

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Choose a new version or tag."
            exit 1
          fi

          if [ "$GITHUB_REF_TYPE" != "tag" ] &&
            git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists without a release. Choose a new version or publish from that tag."
            exit 1
          fi
      - name: Prepare signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          RELEASE_KEYSTORE="$RUNNER_TEMP/github-rock-release.jks"
          VALIDATION_KEYSTORE="$RUNNER_TEMP/github-rock-validation.p12"
          trap 'rm -f "$VALIDATION_KEYSTORE"' EXIT

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RELEASE_KEYSTORE"
          [ -s "$RELEASE_KEYSTORE" ] || {
            echo "The decoded Android keystore is empty. Replace ANDROID_KEYSTORE_BASE64."
            exit 1
          }

          keytool -list \
            -keystore "$RELEASE_KEYSTORE" \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null

          keytool -importkeystore \
            -srckeystore "$RELEASE_KEYSTORE" \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -srcalias "$KEY_ALIAS" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeystore "$VALIDATION_KEYSTORE" \
            -deststoretype PKCS12 \
            -deststorepass validation-only-password \
            -destkeypass validation-only-password \
            -noprompt >/dev/null

          echo "Android signing keystore, alias, and private-key password validated."
      - name: Build signed release APK
        env:
          GITHUB_ROCK_KEYSTORE_PATH: ${{ runner.temp }}/github-rock-release.jks
          GITHUB_ROCK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GITHUB_ROCK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_ROCK_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace \
            -PGITHUB_ROCK_VERSION_NAME="$VERSION" \
            -PGITHUB_ROCK_VERSION_CODE="${{ github.run_number }}"
      - name: Verify signature, certificate, and checksum
        run: |
          set -euo pipefail

          APK="$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          [ -f "$APK" ] || { echo "No release APK was produced."; exit 1; }

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          [ -x "$APKSIGNER" ] || { echo "Android apksigner was not found."; exit 1; }

          CERT_OUTPUT="$("$APKSIGNER" verify --verbose --print-certs "$APK" 2>&1)"
          printf '%s\n' "$CERT_OUTPUT"

          ACTUAL_CERT_SHA256="$(
            printf '%s\n' "$CERT_OUTPUT" |
              bash tools/release/extract-apksigner-cert-sha256.sh
          )"
          [ "$ACTUAL_CERT_SHA256" = "$EXPECTED_RELEASE_CERT_SHA256" ] || {
            echo "Release signing certificate mismatch."
            echo "Expected: $EXPECTED_RELEASE_CERT_SHA256"
            echo "Actual:   $ACTUAL_CERT_SHA256"
            exit 1
          }

          mkdir -p dist
          RELEASE_APK="GitHub-Rock-$VERSION.apk"
          cp "$APK" "dist/$RELEASE_APK"
          (cd dist && sha256sum "$RELEASE_APK" > "$RELEASE_APK.sha256")
          printf '%s\n' "$ACTUAL_CERT_SHA256" > "dist/$RELEASE_APK.certificate.sha256"

          {
            echo "### APK signing certificate"
            echo
            echo "Verified SHA-256: \`$ACTUAL_CERT_SHA256\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload verified workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: GitHub-Rock-${{ env.VERSION }}
          path: dist/*
          if-no-files-found: error

  companions:
    name: Build desktop and optional iOS packages
    needs: android
    uses: ./.github/workflows/cross-platform-build.yml
    with:
      version: ${{ needs.android.outputs.version }}
      build_ios: ${{ vars.ENABLE_IOS_RELEASE == 'true' }}
      apple_team_id: ${{ vars.APPLE_TEAM_ID || '' }}
    secrets:
      APPLE_IOS_CERTIFICATE_BASE64: ${{ secrets.APPLE_IOS_CERTIFICATE_BASE64 }}
      APPLE_IOS_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_IOS_CERTIFICATE_PASSWORD }}
      APPLE_IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_IOS_PROVISIONING_PROFILE_BASE64 }}

  publish:
    name: Publish verified release assets
    needs:
      - android
      - companions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Download every verified package
        uses: actions/download-artifact@v8
        with:
          pattern: GitHub-Rock-${{ needs.android.outputs.version }}*
          path: dist
          merge-multiple: true
      - name: Validate release asset matrix
        env:
          VERSION: ${{ needs.android.outputs.version }}
          REQUIRE_IOS: ${{ vars.ENABLE_IOS_RELEASE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            "GitHub-Rock-$VERSION.apk"
            "GitHub-Rock-$VERSION-macos-arm64.dmg"
            "GitHub-Rock-$VERSION-macos-arm64.pkg"
            "GitHub-Rock-$VERSION-macos-x64.dmg"
            "GitHub-Rock-$VERSION-macos-x64.pkg"
            "GitHub-Rock-$VERSION-windows-x64.msi"
            "GitHub-Rock-$VERSION-windows-x64-setup.exe"
            "GitHub-Rock-$VERSION-windows-x64-portable.zip"
            "GitHub-Rock-$VERSION-linux-x64.AppImage"
            "GitHub-Rock-$VERSION-linux-x64.deb"
            "GitHub-Rock-$VERSION-linux-x64.rpm"
            "GitHub-Rock-$VERSION-linux-x64.pkg.tar.zst"
          )
          if [ "$REQUIRE_IOS" = "true" ]; then
            expected+=("GitHub-Rock-$VERSION-ios-arm64.ipa")
          fi

          for asset in "${expected[@]}"; do
            test -s "dist/$asset" || {
              echo "Required release asset is missing or empty: $asset" >&2
              exit 1
            }
            test -s "dist/$asset.sha256" || {
              echo "Required checksum is missing or empty: $asset.sha256" >&2
              exit 1
            }
          done

          find dist -maxdepth 1 -type f -printf '%f\n' | sort
      - name: Publish public GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.android.outputs.version }}
          RELEASE_TAG: ${{ needs.android.outputs.release_tag }}
          PRERELEASE: ${{ needs.android.outputs.prerelease }}
        run: |
          set -euo pipefail
          FLAGS=()
          TARGET_FLAGS=()

          if [ "$PRERELEASE" = "true" ]; then
            FLAGS+=(--prerelease)
          fi
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            FLAGS+=(--verify-tag)
          else
            TARGET_FLAGS+=(--target "$GITHUB_SHA")
          fi

          gh release create "$RELEASE_TAG" dist/* \
            "${TARGET_FLAGS[@]}" \
            --title "GitHub Rock v$VERSION" \
            --generate-notes \
            "${FLAGS[@]}"
