name: Publish Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version with or without the v prefix; blank creates a unique automatic version
        required: false
        default: ''
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GITHUB_CLIENT_ID: ${{ vars.PUBLIC_GITHUB_OAUTH_CLIENT_ID || 'Ov23lim8WhLjeUMqvuMj' }}
      EXPECTED_RELEASE_CERT_SHA256: ${{ vars.EXPECTED_RELEASE_CERT_SHA256 }}
      INPUT_VERSION: ${{ inputs.version }}
      INPUT_PRERELEASE: ${{ inputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.13
      - name: Resolve release metadata
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            [ "$GITHUB_REF_TYPE" = "tag" ] || {
              echo "Automatic releases must be triggered by a tag."
              exit 1
            }
            RELEASE_TAG="$GITHUB_REF_NAME"
            VERSION="${RELEASE_TAG#v}"
            if [[ "$VERSION" == *-* ]]; then
              PRERELEASE=true
            else
              PRERELEASE=false
            fi
          else
            REQUESTED_VERSION="${INPUT_VERSION#v}"
            if [ -n "$REQUESTED_VERSION" ]; then
              VERSION="$REQUESTED_VERSION"
            else
              VERSION="0.1.$GITHUB_RUN_NUMBER"
            fi
            RELEASE_TAG="v$VERSION"
            PRERELEASE="$(printf '%s' "${INPUT_PRERELEASE:-false}" | tr '[:upper:]' '[:lower:]')"
          fi

          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]] || {
            echo "Use a version such as 0.2.0 or 0.2.0-beta.1."
            exit 1
          }

          [ "$PRERELEASE" = "true" ] || [ "$PRERELEASE" = "false" ] || {
            echo "Prerelease must be true or false."
            exit 1
          }

          {
            echo "VERSION=$VERSION"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "PRERELEASE=$PRERELEASE"
          } >> "$GITHUB_ENV"

          {
            echo "### Release request"
            echo
            echo "- Tag: \`$RELEASE_TAG\`"
            echo "- Version: \`$VERSION\`"
            echo "- Public release: yes"
            echo "- Prerelease: \`$PRERELEASE\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Validate release configuration
        env:
          GH_TOKEN: ${{ github.token }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          [ -n "$GITHUB_CLIENT_ID" ] || {
            echo "Set the PUBLIC_GITHUB_OAUTH_CLIENT_ID Actions variable."
            exit 1
          }

          [ -n "$EXPECTED_RELEASE_CERT_SHA256" ] || {
            echo "Set the EXPECTED_RELEASE_CERT_SHA256 Actions variable to the trusted release-key fingerprint."
            exit 1
          }

          missing=()
          [ -n "${KEYSTORE_BASE64:-}" ] || missing+=(ANDROID_KEYSTORE_BASE64)
          [ -n "${KEYSTORE_PASSWORD:-}" ] || missing+=(ANDROID_KEYSTORE_PASSWORD)
          [ -n "${KEY_ALIAS:-}" ] || missing+=(ANDROID_KEY_ALIAS)
          [ -n "${KEY_PASSWORD:-}" ] || missing+=(ANDROID_KEY_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing or empty Actions secret: %s\n' "${missing[@]}"
            echo "Create each secret under Settings > Secrets and variables > Actions."
            exit 1
          fi

          echo "All required signing secrets and the expected certificate fingerprint are present."

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Choose a new version or tag."
            exit 1
          fi
      - name: Prepare signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          RELEASE_KEYSTORE="$RUNNER_TEMP/github-rock-release.jks"
          VALIDATION_KEYSTORE="$RUNNER_TEMP/github-rock-validation.p12"
          trap 'rm -f "$VALIDATION_KEYSTORE"' EXIT

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RELEASE_KEYSTORE"
          [ -s "$RELEASE_KEYSTORE" ] || {
            echo "The decoded Android keystore is empty. Replace ANDROID_KEYSTORE_BASE64."
            exit 1
          }

          keytool -list \
            -keystore "$RELEASE_KEYSTORE" \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null

          keytool -importkeystore \
            -srckeystore "$RELEASE_KEYSTORE" \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -srcalias "$KEY_ALIAS" \
            -srckeypass "$KEY_PASSWORD" \
            -destkeystore "$VALIDATION_KEYSTORE" \
            -deststoretype PKCS12 \
            -deststorepass validation-only-password \
            -destkeypass validation-only-password \
            -noprompt >/dev/null

          echo "Android signing keystore, alias, and private-key password validated."
      - name: Build signed release APK
        env:
          GITHUB_ROCK_KEYSTORE_PATH: ${{ runner.temp }}/github-rock-release.jks
          GITHUB_ROCK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GITHUB_ROCK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          GITHUB_ROCK_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace \
            -PGITHUB_ROCK_VERSION_NAME="$VERSION" \
            -PGITHUB_ROCK_VERSION_CODE="${{ github.run_number }}"
      - name: Verify signature, certificate, and checksum
        run: |
          set -euo pipefail

          APK="$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          [ -f "$APK" ] || { echo "No release APK was produced."; exit 1; }

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          [ -x "$APKSIGNER" ] || { echo "Android apksigner was not found."; exit 1; }

          CERT_OUTPUT="$("$APKSIGNER" verify --verbose --print-certs "$APK" 2>&1)"
          printf '%s\n' "$CERT_OUTPUT"

          CERT_SHA256="$(
            printf '%s\n' "$CERT_OUTPUT" |
              sed -n 's/^Signer #1 certificate SHA-256 digest: //p' |
              head -n 1
          )"
          [ -n "$CERT_SHA256" ] || {
            echo "Unable to read the signer certificate SHA-256 fingerprint."
            exit 1
          }

          normalize_fingerprint() {
            printf '%s' "$1" | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]'
          }

          ACTUAL_CERT_SHA256="$(normalize_fingerprint "$CERT_SHA256")"
          EXPECTED_CERT_SHA256="$(normalize_fingerprint "$EXPECTED_RELEASE_CERT_SHA256")"

          [[ "$ACTUAL_CERT_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
            echo "The APK signer certificate fingerprint is not a valid SHA-256 value."
            exit 1
          }
          [[ "$EXPECTED_CERT_SHA256" =~ ^[0-9a-f]{64}$ ]] || {
            echo "EXPECTED_RELEASE_CERT_SHA256 is not a valid SHA-256 value."
            exit 1
          }
          [ "$ACTUAL_CERT_SHA256" = "$EXPECTED_CERT_SHA256" ] || {
            echo "Release signing certificate mismatch."
            echo "Expected: $EXPECTED_CERT_SHA256"
            echo "Actual:   $ACTUAL_CERT_SHA256"
            exit 1
          }

          mkdir -p dist
          RELEASE_APK="GitHub-Rock-$VERSION.apk"
          cp "$APK" "dist/$RELEASE_APK"
          (cd dist && sha256sum "$RELEASE_APK" > "$RELEASE_APK.sha256")
          printf '%s\n' "$ACTUAL_CERT_SHA256" > "dist/$RELEASE_APK.certificate.sha256"

          {
            echo "### APK signing certificate"
            echo
            echo "Verified SHA-256: \`$ACTUAL_CERT_SHA256\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload verified workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHub-Rock-${{ env.VERSION }}
          path: dist/*
          if-no-files-found: error
      - name: Publish public GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FLAGS=()
          TARGET_FLAGS=()

          if [ "$PRERELEASE" = "true" ]; then
            FLAGS+=(--prerelease)
          fi
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            FLAGS+=(--verify-tag)
          else
            TARGET_FLAGS+=(--target "$GITHUB_SHA")
          fi

          gh release create "$RELEASE_TAG" dist/* \
            "${TARGET_FLAGS[@]}" \
            --title "GitHub Rock v$VERSION" \
            --generate-notes \
            "${FLAGS[@]}"
